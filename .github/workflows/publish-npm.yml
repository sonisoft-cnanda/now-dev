name: Publish to npm (manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 2.0.0)"
        required: true
        type: string
      dry-run:
        description: "Dry run (skip actual publish)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: github.repository == 'sonisoft-cnanda/now-dev'
    runs-on: ubuntu-latest
    environment: npmjs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run build

      - run: npm version ${{ inputs.version }} --no-git-tag-version

      - name: Publish to npm
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            npm publish --access public --provenance --dry-run
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
