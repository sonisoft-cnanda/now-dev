publish:
  stage: release
  needs:
    - job: build
      artifacts: true
    - job: test:unit
      artifacts: false
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
  script:
    - npm ci --prefer-offline
    - |
      {
        echo "@sonisoft:registry=https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/"
        echo "//${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}"
      } > .npmrc
    - npx semantic-release

publish:npmjs:
  stage: release
  needs:
    - job: build
      artifacts: true
    - job: test:unit
      artifacts: false
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: manual
      allow_failure: true
  script:
    - VERSION=${CI_COMMIT_TAG#v}
    - echo "Publishing @sonisoft/now-sdk-ext-core@${VERSION} to npmjs"
    - npm version $VERSION --no-git-tag-version
    - |
      {
        echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}"
      } > .npmrc
    - npm publish --access public
  environment:
    name: npmjs
    url: https://www.npmjs.com/package/@sonisoft/now-sdk-ext-core
